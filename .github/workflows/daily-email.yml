name: Daily New Yorker Email

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days back to fetch (0=today, 1=yesterday, etc.)'
        required: false
        default: '0'
        type: string

env:
  kimi_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_MODEL: moonshotai/kimi-k2.5
  KIMI_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily task
        run: |
          if [ -n "${{ github.event.inputs.days_back }}" ]; then
            python daily_task.py backfill ${{ github.event.inputs.days_back }}
          else
            python daily_task.py
          fi
